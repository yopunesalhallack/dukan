<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html">الرئيسية</a>
    <a href="products.html">المنتجات</a>
    <a href="purchases.html">المشتريات</a>
    <a href="currencies.html">العملات</a>
    <a href="reports.html">تقارير</a>
    <a href="sales.html">فاتورة بيع</a>
    <a href="customers.html">العملاء</a>
    <a href="#" onclick="logout()">تسجيل الخروج</a>
  </nav>
  <div class="container">
    <h1>مرحباً، <span id="userName"></span></h1>
    <div class="cards">
      <div class="card">
        <h3>المنتجات</h3>
        <p id="productCount">--</p>
      </div>
      <div class="card">
        <h3>مبيعات اليوم</h3>
        <p id="todaySales">--</p>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    document.getElementById('userName').textContent = user.name;

    async function loadStats() {
      try {
        // عدد المنتجات
        const products = await api.get('/products');
        document.getElementById('productCount').textContent = products.length;

        // إحصائيات اليوم باستخدام التقارير
        const today = new Date().toISOString().split('T')[0];
        const summary = await api.get(`/reports/summary?start_date=${today}&end_date=${today}`);
        document.getElementById('todaySales').innerHTML = `
          ${summary.sales_count} عملية بيع - ${summary.total_sales}<br>
          ${summary.purchase_count} عملية شراء - ${summary.total_purchases}<br>
          الربح: ${summary.profit}
        `;
      } catch (err) {
        console.error(err);
        document.getElementById('todaySales').textContent = 'غير متوفر';
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/index.html';
    }

    loadStats();
  
  </script>
</body>
</html>
