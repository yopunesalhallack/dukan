
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملات | نظام إدارة المتجر</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
<body>
<div class="app-wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">متجر الهدى</div>
        <ul class="sidebar-menu">
            <li class="menu-item"><a href="dashboard.html" class="menu-link"><i class="fas fa-chart-line menu-icon"></i> الرئيسية</a></li>
            <li class="menu-item"><a href="products.html" class="menu-link"><i class="fas fa-box menu-icon"></i> المنتجات</a></li>
            <li class="menu-item"><a href="categories.html" class="menu-link"><i class="fas fa-tags menu-icon"></i> التصنيفات</a></li>
            <li class="menu-item"><a href="sales.html" class="menu-link"><i class="fas fa-shopping-cart menu-icon"></i> فاتورة بيع</a></li>
            <li class="menu-item"><a href="purchases.html" class="menu-link"><i class="fas fa-truck menu-icon"></i> فاتورة شراء</a></li>
            <li class="menu-item"><a href="currencies.html" class="menu-link active"><i class="fas fa-money-bill-wave menu-icon"></i> العملات</a></li>
            <li class="menu-item"><a href="reports.html" class="menu-link"><i class="fas fa-file-contract menu-icon"></i> التقارير</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="main-header">
            <div class="header-right">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h1 class="header-title">العملات</h1>
            </div>
            <div class="header-actions">
                <span id="userInfo">أهلاً، <span id="userName"></span></span>
                <button class="btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </header>

        <div class="page-container">
            <!-- بطاقة قائمة العملات -->
            <div class="card table-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2>قائمة العملات</h2>
                    <button class="btn btn-primary" id="showAddBtn"><i class="fas fa-plus"></i> إضافة عملة</button>
                </div>
                <table id="currenciesTable">
                    <thead>
                        <tr>
                            <th>الرمز</th>
                            <th>الاسم</th>
                            <th>الرمز النقدي</th>
                            <th>أساسية</th>
                            <th>سعر الصرف</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card" id="currencyFormCard" style="display: none;">
                <h2 id="formTitle">إضافة عملة</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>الرمز (مثلاً USD)</label>
                        <input type="text" id="code" class="form-control" placeholder="USD">
                    </div>
                    <div class="form-group">
                        <label>الاسم (دولار)</label>
                        <input type="text" id="name" class="form-control" placeholder="دولار أمريكي">
                    </div>
                    <div class="form-group">
                        <label>الرمز النقدي ($)</label>
                        <input type="text" id="symbol" class="form-control" placeholder="$">
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="isDefault"> عملة أساسية
                        </label>
                    </div>
                </div>
                <div class="form-row">
                    <button class="btn btn-primary" id="saveCurrencyBtn">حفظ</button>
                    <button class="btn btn-outline" id="cancelFormBtn">إلغاء</button>
                </div>
            </div>
              //. ......exghange rate card
            <div class="card">
                <h2>تحديث سعر الصرف</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>اختر العملة</label>
                        <select id="exchangeCurrency" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <label>سعر الصرف مقابل العملة الأساسية</label>
                        <input type="number" id="rate" class="form-control" step="0.0001" placeholder="مثال: 1250">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-success" id="updateRateBtn"><i class="fas fa-sync-alt"></i> تحديث السعر</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<button class="voice-btn" id="globalVoiceBtn"><i class="fas fa-microphone"></i></button>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    // ayth 
    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    const user = JSON.parse(localStorage.getItem('user'));
    if (user && user.name) document.getElementById('userName').textContent = user.name;

    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    });

    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    let editingCurrencyId = null;

    async function loadCurrencies() {
        try {
            const currencies = await api.get('/currencies');
            const tbody = document.querySelector('#currenciesTable tbody');
            tbody.innerHTML = '';
            currencies.forEach(c => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = c.code;
                row.insertCell(1).textContent = c.name;
                row.insertCell(2).textContent = c.symbol;
                row.insertCell(3).textContent = c.is_default ? '✅' : '';
                const rateCell = row.insertCell(4);
                rateCell.id = `rate-${c.id}`;
                rateCell.textContent = '--';
                const actionsCell = row.insertCell(5);
                actionsCell.innerHTML = `
                    <button class="btn btn-sm btn-warning" onclick="editCurrency(${c.id})"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteCurrency(${c.id})"><i class="fas fa-trash"></i> حذف</button>
                    <button class="btn btn-sm btn-primary" onclick="updateRateForCurrency(${c.id})"><i class="fas fa-exchange-alt"></i> تحديث السعر</button>
                `;
            });
            await loadRates();
            await loadExchangeDropdown();      
        } catch (err) {
            alert(err.message);
        }
    }

    async function loadRates() {
        try {
            const rates = await api.get('/exchange');
            rates.forEach(r => {
                const cell = document.getElementById(`rate-${r.id}`);
                if (cell) {
                    if (r.is_default) {
                        cell.textContent = '1 (أساسية)';
                    } else if (r.rate) {
                        cell.textContent = r.rate;
                    } else {
                        cell.textContent = 'غير محدد';
                    }
                }
            });
        } catch (err) {
            console.error(err);
        }
    }

    async function loadExchangeDropdown() {
        try {
            const currencies = await api.get('/currencies');
            const select = document.getElementById('exchangeCurrency');
            select.innerHTML = '';
            currencies.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = `${c.code} - ${c.name}`;
                select.appendChild(option);
            });
        } catch (err) {
            console.error(err);
        }
    }

    function showAddForm() {
        editingCurrencyId = null;
        document.getElementById('formTitle').textContent = 'إضافة عملة';
        document.getElementById('currencyFormCard').style.display = 'block';
        clearCurrencyForm();
    }

    async function editCurrency(id) {
        try {
            const currencies = await api.get('/currencies');
            const currency = currencies.find(c => c.id == id);
            if (!currency) return;
            document.getElementById('code').value = currency.code;
            document.getElementById('name').value = currency.name;
            document.getElementById('symbol').value = currency.symbol;
            document.getElementById('isDefault').checked = currency.is_default;
            editingCurrencyId = id;
            document.getElementById('formTitle').textContent = 'تعديل عملة';
            document.getElementById('currencyFormCard').style.display = 'block';
        } catch (err) {
            alert(err.message);
        }
    }

    async function saveCurrency() {
        const data = {
            code: document.getElementById('code').value,
            name: document.getElementById('name').value,
            symbol: document.getElementById('symbol').value,
            is_default: document.getElementById('isDefault').checked
        };
        if (!data.code || !data.name) {
            alert('يرجى ملء الحقول الأساسية');
            return;
        }
        try {
            if (editingCurrencyId) {
                await api.put(`/currencies/${editingCurrencyId}`, data);
            } else {
                await api.post('/currencies', data);
            }
            hideForm();
            loadCurrencies();
        } catch (err) {
            alert(err.message);
        }
    }

    //  delet 
    async function deleteCurrency(id) {
        if (confirm('هل تريد حذف العملة؟')) {
            try {
                await api.delete(`/currencies/${id}`);
                loadCurrencies();
            } catch (err) {
                alert(err.message);
            }
        }
    }

    async function updateRate() {
        const currency_id = document.getElementById('exchangeCurrency').value;
        const rate = document.getElementById('rate').value;
        if (!currency_id || !rate) {
            alert('اختر العملة وأدخل السعر');
            return;
        }
        try {
            await api.post('/exchange', { currency_id, rate });
            alert('تم تحديث سعر الصرف بنجاح');
            loadCurrencies();     
            document.getElementById('rate').value = '';
        } catch (err) {
            alert(err.message);
        }
    }

    // update rate 
    async function updateRateForCurrency(id) {
        const newRate = prompt('أدخل سعر الصرف الجديد مقابل العملة الأساسية:');
        if (newRate && !isNaN(newRate)) {
            try {
                await api.post('/exchange', { currency_id: id, rate: parseFloat(newRate) });
                alert('تم تحديث السعر');
                loadCurrencies();
            } catch (err) {
                alert(err.message);
            }
        }
    }

    function hideForm() {
        document.getElementById('currencyFormCard').style.display = 'none';
        clearCurrencyForm();
    }

    function clearCurrencyForm() {
        document.getElementById('code').value = '';
        document.getElementById('name').value = '';
        document.getElementById('symbol').value = '';
        document.getElementById('isDefault').checked = false;
        editingCurrencyId = null;
    }

    document.getElementById('showAddBtn').addEventListener('click', showAddForm);
    document.getElementById('saveCurrencyBtn').addEventListener('click', saveCurrency);
    document.getElementById('cancelFormBtn').addEventListener('click', hideForm);
    document.getElementById('updateRateBtn').addEventListener('click', updateRate);

    loadCurrencies();

    // speech
    const speak = (text) => {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            window.speechSynthesis.speak(utterance);
        }
    };
    let globalRecognition = null;
    let isGlobalListening = false;
    const globalVoiceBtn = document.getElementById('globalVoiceBtn');
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        globalRecognition = new SpeechRecognition();
        globalRecognition.lang = 'ar-SA';
        globalRecognition.continuous = false;
        globalRecognition.onstart = () => {
            isGlobalListening = true;
            globalVoiceBtn.classList.add('listening');
        };
        globalRecognition.onend = () => {
            isGlobalListening = false;
            globalVoiceBtn.classList.remove('listening');
        };
        globalRecognition.onresult = (e) => {
            const cmd = e.results[0][0].transcript;
            if (cmd.includes('الرئيسية')) window.location.href = 'dashboard.html';
            else if (cmd.includes('المنتجات')) window.location.href = 'products.html';
            else if (cmd.includes('فاتورة بيع')) window.location.href = 'sales.html';
            else if (cmd.includes('التقارير')) window.location.href = 'reports.html';
            else if (cmd.includes('العملات')) window.location.href = 'currencies.html';
            else speak('عذراً، لم أفهم الأمر');
        };
        globalVoiceBtn.addEventListener('click', () => {
            if (!isGlobalListening) {
                speak('تحدث الآن');
                setTimeout(() => globalRecognition.start(), 1500);
            } else {
                globalRecognition.stop();
            }
        });
    } else if (globalVoiceBtn) globalVoiceBtn.style.display = 'none';
</script>
</body>
</html>
