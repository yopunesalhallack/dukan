<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التقارير</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- تضمين Chart.js من CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html">الرئيسية</a>
    <a href="products.html">المنتجات</a>
    <a href="sales.html">فاتورة بيع</a>
    <a href="purchases.html">فاتورة شراء</a>
    <a href="currencies.html">العملات</a>
    <a href="reports.html">التقارير</a>
    <a href="#" onclick="logout()">تسجيل الخروج</a>
  </nav>
  <div class="container">
    <h2>التقارير</h2>
    
    <!-- أزرار الفترة الزمنية السريعة -->
    <div class="filters">
      <button onclick="setPeriod('today')">اليوم</button>
      <button onclick="setPeriod('week')">هذا الأسبوع</button>
      <button onclick="setPeriod('month')">هذا الشهر</button>
      <button onclick="setPeriod('year')">هذا العام</button>
      <label>من: <input type="date" id="startDate"></label>
      <label>إلى: <input type="date" id="endDate"></label>
      <button onclick="loadReport()">عرض</button>
    </div>
    
    <!-- اختيار العملة -->
    <div class="currency-selector">
      <label>العملة:</label>
      <select id="reportCurrency"></select>
    </div>

    <!-- بطاقات الملخص -->
    <div class="cards" id="summaryCards">
      <div class="card"><h3>المبيعات</h3><p id="totalSales">--</p></div>
      <div class="card"><h3>المشتريات</h3><p id="totalPurchases">--</p></div>
      <div class="card"><h3>الربح</h3><p id="profit">--</p></div>
    </div>

    <!-- مخطط بياني -->
    <canvas id="salesChart" width="400" height="200"></canvas>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let myChart = null;

    // تعيين تواريخ سريعة
    function setPeriod(period) {
      const today = new Date();
      const start = new Date();
      if (period === 'today') {
        // start stays today
      } else if (period === 'week') {
        start.setDate(today.getDate() - 7);
      } else if (period === 'month') {
        start.setMonth(today.getMonth() - 1);
      } else if (period === 'year') {
        start.setFullYear(today.getFullYear() - 1);
      }
      document.getElementById('startDate').value = start.toISOString().split('T')[0];
      document.getElementById('endDate').value = today.toISOString().split('T')[0];
      loadReport();
    }

    // تحميل العملات لملء القائمة المنسدلة
    async function loadCurrenciesForReport() {
      try {
        const currencies = await api.get('/currencies');
        const select = document.getElementById('reportCurrency');
        select.innerHTML = '';
        currencies.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.code + ' (' + c.symbol + ')';
          if (c.is_default) opt.selected = true; // اجعل العملة الأساسية مختارة افتراضيًا
          select.appendChild(opt);
        });
      } catch (err) {
        console.error('فشل تحميل العملات:', err);
      }
    }

    // تحميل التقرير من الخادم وتحديث البطاقات والمخطط
    async function loadReport() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      const currencyId = document.getElementById('reportCurrency').value;
      
      if (!start || !end) {
        alert('يرجى تحديد تاريخ البداية والنهاية');
        return;
      }

      try {
        const summary = await api.get(`/reports/summary?start_date=${start}&end_date=${end}&currency_id=${currencyId}`);
        
        // تحديث البطاقات
        document.getElementById('totalSales').textContent = summary.total_sales;
        document.getElementById('totalPurchases').textContent = summary.total_purchases;
        document.getElementById('profit').textContent = summary.profit;

        // تحديث المخطط البياني
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['المبيعات', 'المشتريات', 'الربح'],
            datasets: [{
              label: 'المبلغ',
              data: [
                parseFloat(summary.total_sales), 
                parseFloat(summary.total_purchases), 
                parseFloat(summary.profit)
              ],
              backgroundColor: [
                'rgba(39, 174, 96, 0.6)',  // أخضر للمبيعات
                'rgba(231, 76, 60, 0.6)',  // أحمر للمشتريات
                'rgba(52, 152, 219, 0.6)'  // أزرق للربح
              ],
              borderColor: [
                'rgba(39, 174, 96, 1)',
                'rgba(231, 76, 60, 1)',
                'rgba(52, 152, 219, 1)'
              ],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              title: {
                display: true,
                text: 'ملخص الفترة المحددة'
              }
            },
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      } catch (err) {
        alert('خطأ في تحميل التقرير: ' + err.message);
        console.error(err);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/index.html';
    }

    // تهيئة الصفحة عند التحميل
    (function init() {
      // تعيين التواريخ الافتراضية (آخر 7 أيام)
      const today = new Date();
      const lastWeek = new Date();
      lastWeek.setDate(today.getDate() - 7);
      document.getElementById('startDate').value = lastWeek.toISOString().split('T')[0];
      document.getElementById('endDate').value = today.toISOString().split('T')[0];
      
      // تحميل العملات ثم عرض التقرير الأولي
      loadCurrenciesForReport().then(() => loadReport());
    })();
  </script>
</body>
</html>
