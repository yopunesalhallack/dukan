<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير | نظام إدارة المتجر</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
</head>
<body>
<div class="app-wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">متجر الهدى</div>
        <ul class="sidebar-menu">
            <li class="menu-item"><a href="dashboard.html" class="menu-link"><i class="fas fa-chart-line menu-icon"></i> الرئيسية</a></li>
            <li class="menu-item"><a href="products.html" class="menu-link"><i class="fas fa-box menu-icon"></i> المنتجات</a></li>
            <li class="menu-item"><a href="categories.html" class="menu-link"><i class="fas fa-tags menu-icon"></i> التصنيفات</a></li>
            <li class="menu-item"><a href="sales.html" class="menu-link"><i class="fas fa-shopping-cart menu-icon"></i> فاتورة بيع</a></li>
            <li class="menu-item"><a href="purchases.html" class="menu-link"><i class="fas fa-truck menu-icon"></i> فاتورة شراء</a></li>
            <li class="menu-item"><a href="currencies.html" class="menu-link"><i class="fas fa-money-bill-wave menu-icon"></i> العملات</a></li>
            <li class="menu-item"><a href="reports.html" class="menu-link active"><i class="fas fa-file-contract menu-icon"></i> التقارير</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="main-header">
            <div class="header-right">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h1 class="header-title">التقارير</h1>
            </div>
            <div class="header-actions">
                <span id="userInfo">أهلاً، <span id="userName"></span></span>
                <button class="btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </header>

        <div class="page-container">
            <div class="card">
                <h2>فلترة التقرير</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>أزرار سريعة</label>
                        <div class="quick-buttons">
                            <button class="btn-sm" onclick="setPeriod('today')">اليوم</button>
                            <button class="btn-sm" onclick="setPeriod('week')">هذا الأسبوع</button>
                            <button class="btn-sm" onclick="setPeriod('month')">هذا الشهر</button>
                            <button class="btn-sm" onclick="setPeriod('year')">هذا العام</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>من تاريخ</label>
                        <input type="date" id="startDate" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>إلى تاريخ</label>
                        <input type="date" id="endDate" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>العملة</label>
                        <select id="reportCurrency" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" id="viewReportBtn" style="margin-top: 24px;">عرض التقرير</button>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-shopping-cart stat-icon"></i>
                    <div class="stat-info">
                        <div class="stat-value" id="totalSales">--</div>
                        <div class="stat-label">إجمالي المبيعات</div>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-truck stat-icon"></i>
                    <div class="stat-info">
                        <div class="stat-value" id="totalPurchases">--</div>
                        <div class="stat-label">إجمالي المشتريات</div>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-chart-line stat-icon"></i>
                    <div class="stat-info">
                        <div class="stat-value" id="profit">--</div>
                        <div class="stat-label">صافي الربح</div>
                    </div>
                </div>
            </div>

            
            <div class="card">
                <h2>الرسم البياني للمبيعات والمشتريات والأرباح</h2>
                <div class="chart-container">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>
    </main>
</div>

<button class="voice-btn" id="globalVoiceBtn"><i class="fas fa-microphone"></i></button>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    // auth function
    if (!localStorage.getItem('token')) window.location.href = 'index.html';
    const user = JSON.parse(localStorage.getItem('user'));
    if (user && user.name) document.getElementById('userName').textContent = user.name;

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    });

    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

    let myChart = null;

    //   default dates
    function setPeriod(period) {
        const today = new Date();
        const start = new Date();
        if (period === 'today') {
            // today
        } else if (period === 'week') {
            start.setDate(today.getDate() - 7);
        } else if (period === 'month') {
            start.setMonth(today.getMonth() - 1);
        } else if (period === 'year') {
            start.setFullYear(today.getFullYear() - 1);
        }
        document.getElementById('startDate').value = start.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        loadReport();
    }

    async function loadCurrenciesForReport() {
        try {
            const currencies = await api.get('/currencies');
            const select = document.getElementById('reportCurrency');
            select.innerHTML = '';
            currencies.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.code + ' (' + c.symbol + ')';
                if (c.is_default) opt.selected = true;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error('فشل تحميل العملات:', err);
        }
    }

    async function loadReport() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const currencyId = document.getElementById('reportCurrency').value;
        
        if (!start || !end) {
            alert('يرجى تحديد تاريخ البداية والنهاية');
            return;
        }

        try {
            const summary = await api.get(`/reports/summary?start_date=${start}&end_date=${end}&currency_id=${currencyId}`);
            
            // update cards
            document.getElementById('totalSales').textContent = summary.total_sales;
            document.getElementById('totalPurchases').textContent = summary.total_purchases;
            document.getElementById('profit').textContent = summary.profit;

            //update chart
            const ctx = document.getElementById('salesChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['المبيعات', 'المشتريات', 'الربح'],
                    datasets: [{
                        label: 'المبلغ',
                        data: [
                            parseFloat(summary.total_sales), 
                            parseFloat(summary.total_purchases), 
                            parseFloat(summary.profit)
                        ],
                        backgroundColor: [
                            'rgba(39, 174, 96, 0.6)',  
                            'rgba(231, 76, 60, 0.6)',  
                            'rgba(52, 152, 219, 0.6)'   
                        ],
                        borderColor: [
                            'rgba(39, 174, 96, 1)',
                            'rgba(231, 76, 60, 1)',
                            'rgba(52, 152, 219, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        title: {
                            display: true,
                            text: 'ملخص الفترة المحددة'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        } catch (err) {
            alert('خطأ في تحميل التقرير: ' + err.message);
            console.error(err);
        }
    }

    
    document.getElementById('viewReportBtn').addEventListener('click', loadReport);

    window.logout = function() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/index.html';
    };

    (function init() {
        const today = new Date();
        const lastWeek = new Date();
        lastWeek.setDate(today.getDate() - 7);
        document.getElementById('startDate').value = lastWeek.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        
        loadCurrenciesForReport().then(() => loadReport());
    })();

    const speak = (text) => {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            window.speechSynthesis.speak(utterance);
        }
    };
    let globalRecognition = null;
    let isGlobalListening = false;
    const globalVoiceBtn = document.getElementById('globalVoiceBtn');
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        globalRecognition = new SpeechRecognition();
        globalRecognition.lang = 'ar-SA';
        globalRecognition.continuous = false;
        globalRecognition.onstart = () => {
            isGlobalListening = true;
            globalVoiceBtn.classList.add('listening');
        };
        globalRecognition.onend = () => {
            isGlobalListening = false;
            globalVoiceBtn.classList.remove('listening');
        };
        globalRecognition.onresult = (e) => {
            const cmd = e.results[0][0].transcript;
            if (cmd.includes('الرئيسية')) window.location.href = 'dashboard.html';
            else if (cmd.includes('المنتجات')) window.location.href = 'products.html';
            else if (cmd.includes('فاتورة بيع')) window.location.href = 'sales.html';
            else if (cmd.includes('التقارير')) window.location.href = 'reports.html';
            else speak('عذراً، لم أفهم الأمر');
        };
        globalVoiceBtn.addEventListener('click', () => {
            if (!isGlobalListening) {
                speak('تحدث الآن');
                setTimeout(() => globalRecognition.start(), 1500);
            } else {
                globalRecognition.stop();
            }
        });
    } else if (globalVoiceBtn) globalVoiceBtn.style.display = 'none';
</script>
</body>
</html>
